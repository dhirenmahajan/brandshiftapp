<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrandShift | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="glass-panel auth-card">
      <div class="brand-header">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
        <span class="brand-text">BrandShift</span>
      </div>
      <p style="color: var(--text-muted); margin-bottom: 32px;">Welcome back. Please login to your account.</p>
      
      <form id="login-form">
        <div class="form-group" style="text-align: left;">
          <label for="username" class="form-label">Username</label>
          <input id="username" name="username" type="text" class="form-input" required placeholder="name@company.com" />
        </div>
        <div class="form-group" style="text-align: left;">
          <label for="email" class="form-label">Email Address</label>
          <input id="email" name="email" type="email" class="form-input" required placeholder="name@company.com" />
        </div>
        <div class="form-group" style="text-align: left;">
          <label for="password" class="form-label">Password</label>
          <input id="password" name="password" type="password" class="form-input" required placeholder="••••••••" />
        </div>
        
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 16px;">Sign In to Dashboard</button>
      </form>
      
      <div style="margin-top: 24px; font-size: 0.9rem;">
         <p style="color: var(--text-muted);">Don't have an account? <a href="#">Request Access</a></p>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
