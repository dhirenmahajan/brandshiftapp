<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrandShift | Data Search</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="brand-header">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
        <span class="brand-text">BrandShift</span>
      </div>
      <nav>
        <ul class="nav-links">
          <li><a href="dashboard.html" class="nav-item">Dashboard</a></li>
          <li><a href="search.html" class="nav-item active">Data Search</a></li>
          <li><a href="upload.html" class="nav-item">Data Upload</a></li>
          <li style="margin-top: 40px;"><a href="index.html" class="nav-item" style="color: var(--status-danger);">Logout</a></li>
        </ul>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="page-header">
        <h1 class="page-title">Interactive Data Search</h1>
        <p class="page-subtitle">Query specific household transaction histories from the Azure Data Store.</p>
      </header>

      <div class="glass-panel" style="padding: 32px; margin-bottom: 32px;">
        <form id="search-form" style="display: flex; gap: 16px; align-items: flex-end;">
          <div class="form-group" style="margin-bottom: 0; flex: 1; max-width: 400px;">
            <label for="hshd_num" class="form-label">Household Number (HSHD_NUM)</label>
            <input id="hshd_num" name="hshd_num" type="text" class="form-input" placeholder="e.g. 10" required />
          </div>
          <button type="submit" class="btn-primary">Execute Query</button>
          <button type="button" id="hh10-btn" class="btn-secondary">Demo: Fetch HH #10 Pull</button>
        </form>
      </div>

      <div id="results">
        <!-- Results table injected by app.js -->
        <div style="text-align: center; padding: 40px; color: var(--text-muted); border: 1px dashed var(--border-glass); border-radius: 8px;">
          Enter a household number above to pull transaction data.
        </div>
      </div>
    </main>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
