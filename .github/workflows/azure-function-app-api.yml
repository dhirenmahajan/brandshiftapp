name: Deploy Python API to Azure Function App

# Deploys the Python Functions in /api to the standalone Function App
# `brandshift-api-dhiren`. The Static Web App workflow above only
# publishes /src, so this job keeps the backend in sync whenever api/**
# changes.
#
# One-time setup:
#   1. Azure Portal → Function App → Deployment Center → Manage publish
#      profile → Download publish profile.
#   2. GitHub → repo Settings → Secrets and variables → Actions → New
#      repository secret named AZURE_FUNCTIONAPP_PUBLISH_PROFILE, paste
#      the XML contents.
#   3. Azure Portal → Function App → CORS → add
#      https://nice-sky-0f57ad11e.2.azurestaticapps.net (and any preview
#      domains). Save.

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/azure-function-app-api.yml"
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: brandshift-api-dhiren
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "./api"
  PYTHON_VERSION: "3.11"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies into the deployment bundle
        shell: bash
        run: |
          pushd "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}"
          python -m pip install --upgrade pip
          # Azure Functions Python requires dependencies at .python_packages/lib/site-packages
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt
          popd

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: false
          enable-oryx-build: false
